spring.application.name=delivery-system

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# OpenAPI / Swagger Configuration (Using defaults for better compatibility)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

# Google Maps Configuration
google.maps.api.key=${GOOGLE_MAPS_API_KEY}

# Delivery Pricing Configuration
app.delivery.base-price=${DELIVERY_BASE_PRICE}
app.delivery.price-per-km=${DELIVERY_PRICE_PER_KM}
app.delivery.price-per-kg=${DELIVERY_PRICE_PER_KG}
app.delivery.urgency-multiplier=${DELIVERY_URGENCY_MULTIPLIER}

# Default Admin Configuration
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.firstName=${ADMIN_FIRSTNAME}
app.admin.lastName=${ADMIN_LASTNAME}
